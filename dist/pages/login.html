<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Login</h2>

        <form class="auth-form" id="auth-login">
            <input type="text" name="email" class="auth-input" placeholder="Email" />
            <input type="password" name="password" class="auth-input" placeholder="Password" />
            <button type="submit" class="auth-button">Login</button>
        </form>

        <div class="auth-error"></div>

        <div class="auth-links">
            <a href="/signup" class="auth-link">Create Account</a>
            <a href="/forgot-password" class="auth-link" data-auth-view="forgot">Forgot Password?</a>
        </div>
    </div>
</div>
