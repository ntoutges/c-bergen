<!-- Delete category modal -->
<div class="modal-backdrop modal-hidden" id="delete-modal">
    <div class="modal-box">
        <div class="modal-title">Delete Category</div>
        <div class="modal-text">
            Are you sure you want to delete
            <span class="modal-name"></span>?
        </div>
        <input class="modal-input" />

        <div class="modal-buttons">
            <div class="modal-btn modal-btn-cancel">Cancel</div>
            <div class="modal-btn modal-btn-delete">Delete</div>
        </div>
    </div>
</div>
