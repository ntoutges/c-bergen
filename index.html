<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Bergen Tracker</title>
        <link
            rel="icon"
            type="image/x-icon"
            href="/jeremy_bergen_counter.png"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="index.ts" type="module" defer></script>

        <link rel="stylesheet" href="/styles/index.css" />

        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle,add,add_notes,arrow_right,check_circle,close,error,logout,north,pause,play_arrow,restart_alt,shield_person,south,update"
        />
    </head>

    <body>
        <header id="header">
            <!-- The current/previous routes -->
            <nav id="route"></nav>

            <!-- Navigational links dependent on the current location in the site (ontext dependent) -->
            <nav id="context-items">
                <a
                    href="/new"
                    class="material-symbols-outlined -ctx-hidden"
                    id="ctx-new"
                    role="button"
                    title="New Category"
                    >add</a
                >

                <!-- Note that the HREF is set dynamically in 'category.ts' -->
                <a
                    href="/note"
                    class="material-symbols-outlined -ctx-hidden"
                    id="ctx-note"
                    role="button"
                    title="New Entry"
                    >add_notes</a
                >

                <!-- Note that the HREF is set dynamically in 'category.ts' -->
                <a
                    href="/admin"
                    class="material-symbols-outlined -ctx-hidden"
                    id="ctx-admin"
                    role="button"
                    title="Admin Setup"
                    >shield_person</a
                >
                <a
                    href="/"
                    class="material-symbols-outlined -ctx-hidden"
                    id="ctx-close"
                    role="button"
                    title="Cancel"
                    >close</a
                >
                <a
                    href="/login"
                    class="material-symbols-outlined -ctx-hidden"
                    id="ctx-login"
                    role="button"
                    title="Login"
                    >account_circle</a
                >
                <span
                    class="material-symbols-outlined -ctx-hidden"
                    id="ctx-logout"
                    role="button"
                    title="Logout"
                    >logout</span
                >
            </nav>
        </header>

        <!-- The body element to hold the main content for each page -->
        <div id="body"></div>
    </body>
</html>
