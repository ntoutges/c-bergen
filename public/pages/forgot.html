<div class="auth-container">
    <div class="auth-card" id="auth-forgot-card">
        <h2 class="auth-title">Reset Password</h2>

        <form class="auth-form" id="auth-forgot">
            <input type="text" name="email" class="auth-input" placeholder="Email" />
            <button type="submit" class="auth-button">Send Reset Link</button>
        </form>

        <div class="auth-error"></div>

        <div class="auth-links">
            <a href="/login" class="auth-link" data-auth-view="login">Back to Login</a>
        </div>
    </div>
</div>
