<div class="auth-container">
    <div class="auth-card" id="auth-signup-card">
        <h2 class="auth-title">Sign Up</h2>

        <form class="auth-form" id="auth-signup">
            <input type="text" name="email" class="auth-input" placeholder="Email" />
            <input type="password" name="password" class="auth-input" placeholder="Password" />
            <input type="password" name="confirm" class="auth-input" placeholder="Confirm Password" />
            <button type="submit" class="auth-button">Create Account</button>
        </form>

        <div class="auth-error"></div>

        <div class="auth-links">
            <a href="/login" class="auth-link" data-auth-view="login">Back to Login</a>
        </div>
    </div>
</div>
